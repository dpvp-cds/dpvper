<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Profesional - DPvPer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #F8F7F2; color: #6B6661; }
        h1, h2 { font-family: 'Playfair Display', serif; color: #070404; }
        .card { background-color: white; border-radius: 16px; padding: 2rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        .report-item { transition: all 0.2s ease-in-out; border-left: 4px solid transparent; }
        .report-item:hover { transform: translateX(4px); border-left-color: #E8A613; background-color: #fffbf0; }
        
        .loader {
            border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #E8A613;
            width: 24px; height: 24px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="bg-white py-4 shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="logoprincipal.png" alt="Logo DPvPer" class="h-10 object-contain">
                <span class="bg-[#070404] text-white text-[10px] px-3 py-1 rounded-full uppercase tracking-widest font-bold">Portal Terapeuta</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="index.html" target="_blank" class="text-xs font-bold text-[#E8A613] hover:underline uppercase tracking-wider">
                    + Nuevo Test
                </a>
                <button onclick="window.logout()" class="text-xs font-bold text-gray-400 hover:text-red-500 transition flex items-center gap-2 uppercase tracking-wider">
                    Cerrar Sesión
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12 max-w-5xl">
        <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-4">
            <div>
                <h1 class="text-4xl font-bold mb-2 text-[#070404]">Pacientes Registrados</h1>
                <p class="text-gray-500">Historial completo de diagnósticos personales</p>
            </div>
            <!-- Buscador -->
            <div class="relative w-full md:w-72">
                <input type="text" id="searchInput" placeholder="Buscar por nombre..." class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 focus:border-[#E8A613] focus:outline-none text-sm transition-all shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400 absolute left-3.5 top-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            </div>
        </div>

        <!-- CONTENEDOR DE LISTA -->
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden min-h-[500px]">
            <!-- Loader Inicial -->
            <div id="loading" class="flex flex-col items-center justify-center p-20">
                <div class="loader mb-4"></div>
                <p class="text-gray-400 font-medium animate-pulse tracking-widest uppercase text-[10px]">Sincronizando Bóveda...</p>
            </div>

            <!-- Lista de Pacientes -->
            <div id="lista-pacientes" class="hidden divide-y divide-gray-50">
                <!-- Se inyectan los pacientes vía JS -->
            </div>
            
            <!-- Estado Vacío -->
            <div id="empty-state" class="hidden flex flex-col items-center justify-center p-20 text-center">
                <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                </div>
                <h3 class="text-xl font-bold text-gray-700">No se encontraron registros</h3>
                <p class="text-gray-400 text-sm mt-2 max-w-xs mx-auto">Asegúrate de que los pacientes hayan completado el test en el index.html.</p>
            </div>
        </div>
    </main>
    
    <footer class="bg-[#070404] text-white py-10 text-center">
        <p class="text-gray-600 text-xs font-bold uppercase tracking-widest">&copy; 2025 Jorge Arango Castaño - Sistema de Gestión DPvPer</p>
    </footer>

    <script>
        let reportesCache = [];

        // Función auxiliar para construir URLs absolutas y evitar errores de parseo en entornos blob
        const getFullUrl = (path) => {
            try {
                return new URL(path, window.location.origin).href;
            } catch (e) {
                return path;
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            cargarReportes();

            // Buscador Dinámico
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtrados = reportesCache.filter(r => r.nombre.toLowerCase().includes(term));
                renderizarLista(filtrados);
            });
        });

        async function cargarReportes() {
            const lista = document.getElementById('lista-pacientes');
            const loader = document.getElementById('loading');
            const emptyState = document.getElementById('empty-state');

            try {
                // LLAMADA SEGURA A LA API con URL absoluta para evitar TypeError: Failed to parse URL
                const response = await fetch(getFullUrl('/api/get-reportes'));

                if (response.status === 401) {
                    window.location.href = 'terapeuta-login.html';
                    return;
                }

                if (!response.ok) throw new Error('Error de servidor');

                const data = await response.json();
                reportesCache = data.reportes || [];

                loader.classList.add('hidden');

                if (reportesCache.length === 0) {
                    emptyState.classList.remove('hidden');
                } else {
                    lista.classList.remove('hidden');
                    renderizarLista(reportesCache);
                }

            } catch (error) {
                console.error("Error al cargar reportes:", error);
                loader.innerHTML = `<p class="text-red-500 font-bold p-10">Error de conexión con la base de datos.</p>`;
            }
        }

        function renderizarLista(reportes) {
            const container = document.getElementById('lista-pacientes');
            container.innerHTML = '';

            reportes.forEach(rep => {
                const inicial = rep.nombre.charAt(0).toUpperCase();
                
                // CORRECCIÓN: Usar reporte-personal.html con parámetros
                const detailURL = `reporte-personal.html?id=${rep.id}&coleccion=${rep.coleccion || 'reportes-personales'}`;

                const html = `
                    <div class="report-item p-6 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div class="flex items-center gap-5 w-full md:w-auto">
                            <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-[#E8A613] font-bold text-2xl border-2 border-[#E8A613]/10 shadow-sm shrink-0">
                                ${inicial}
                            </div>
                            <div>
                                <h3 class="font-bold text-xl text-[#070404] leading-tight">${rep.nombre}</h3>
                                <div class="flex flex-wrap items-center gap-3 text-xs font-bold uppercase tracking-tighter text-gray-400 mt-2">
                                    <span class="bg-gray-100 text-gray-500 px-2 py-0.5 rounded">${rep.fecha}</span>
                                    <span class="text-[#E8A613]">${rep.arquetipo}</span>
                                    <span class="bg-[#F8F7F2] text-gray-300 px-2 py-0.5 rounded lowercase font-mono">${rep.coleccion}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-3 w-full md:w-auto">
                            <!-- ACCIÓN PRINCIPAL: VER REPORTE CLÍNICO -->
                            <a href="${detailURL}" class="flex-1 md:flex-none text-center bg-[#070404] text-white px-8 py-3 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-[#E8A613] hover:text-[#070404] transition-all shadow-lg">
                                Abrir Expediente
                            </a>
                            
                            <!-- BOTÓN ELIMINAR -->
                            <button onclick="window.confirmDelete('${rep.id}', '${rep.coleccion}', '${rep.nombre}')" class="p-3 text-gray-300 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all" title="Eliminar Registro">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        // Función de borrado con manejo de colecciones y URL absoluta
        window.confirmDelete = async (id, coleccion, nombre) => {
            if(!confirm(`ADVERTENCIA PROFESIONAL:\n\n¿Deseas eliminar permanentemente el diagnóstico de ${nombre}?\n\nEsta acción borrará los datos de la colección [${coleccion}] y no se puede deshacer.`)) return;

            try {
                const deleteUrl = getFullUrl(`/api/eliminar-reporte?id=${id}&coleccion=${coleccion}`);
                const response = await fetch(deleteUrl, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    reportesCache = reportesCache.filter(r => r.id !== id);
                    renderizarLista(reportesCache);
                } else {
                    alert("Error: No se pudo eliminar el registro. Verifica tu sesión.");
                }
            } catch (error) {
                alert("Error de conexión al servidor.");
            }
        };

        // Logout Seguro con URL absoluta
        window.logout = async () => {
            try {
                await fetch(getFullUrl('/api/logout'));
                window.location.href = 'terapeuta-login.html';
            } catch (e) {
                window.location.href = 'terapeuta-login.html';
            }
        };
    </script>
</body>
</html>
